version: "3.9"

# CampDemocracyService — оффлайн-стенд (standalone). Запуск игры Democracy на ноуте без интернета.
# Всё из docker-образов (как онлайн): api + player + admin + nginx-proxy. UI НЕ монтируется папками.
# Требует .env с ADMIN_LOCAL_PASSWORD и ADMIN_LOCAL_JWT_SECRET (см. .env.example).

services:
  postgres:
    image: postgres:15-alpine
    container_name: democracy-postgres
    environment:
      POSTGRES_DB: democracy
      POSTGRES_USER: democracy
      POSTGRES_PASSWORD: ${DB_PASSWORD:-democracy_local_pass}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U democracy"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: democracy-redis
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  democracy-api:
    image: 2345234523452345234534/democracy-service:${VERSION:-1.0.31}
    container_name: democracy-api
    environment:
      SPRING_PROFILES_ACTIVE: standalone
      DEMOCRACY_MODE: standalone
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: democracy
      DB_USER: democracy
      DB_PASSWORD: ${DB_PASSWORD:-democracy_local_pass}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MEDIA_PATH: /data/media
      BUNDLE_AUTOLOAD_PATH: /data/bundles
      BUNDLE_AUTOLOAD_ON_CONFLICT: SKIP
      ADMIN_LOCAL_PASSWORD: ${ADMIN_LOCAL_PASSWORD:?ADMIN_LOCAL_PASSWORD must be set in .env}
      ADMIN_LOCAL_JWT_SECRET: ${ADMIN_LOCAL_JWT_SECRET:?ADMIN_LOCAL_JWT_SECRET must be set in .env}
      TZ: Europe/Moscow
    volumes:
      - ./data/media:/data/media
      - ./bundles:/data/bundles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8126"
    # JVM (MaxRAMPercentage=75%) без лимита возьмёт 75% RAM ВСЕГО хоста — на мини-сервере
    # фиксируем предсказуемо: heap ~768M, контейнер ~0.85-1G.
    mem_limit: 1g
    mem_reservation: 768m
    restart: unless-stopped

  # Плеер игрока — ТОТ ЖE образ, что онлайн. Same-origin задаётся через /config.js (отдаёт nginx).
  democracy-player:
    image: 2345234523452345234534/democracy-player:${PLAYER_VERSION:-1.0.15}
    container_name: democracy-player
    expose:
      - "3001"
    restart: unless-stopped

  # Облегчённая админка Democracy (свой образ, своя версия). Baked config.js = same-origin.
  democracy-admin:
    image: 2345234523452345234534/democracy-admin-standalone:${ADMIN_VERSION:-0.0.1}
    container_name: democracy-admin
    expose:
      - "3000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: democracy-ui
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - democracy-api
      - democracy-player
      - democracy-admin
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  pg-data:
  redis-data:
