server {
    listen 80;
    server_name _;
    client_max_body_size 1100M;

    # Плеер собран как онлайн (VITE=prod), поэтому подменяем /config.js на same-origin.
    # Админка свой config.js уже имеет same-origin — её не трогаем.
    location = /config.js {
        default_type application/javascript;
        return 200 'window.__APP_CONFIG__={apiBaseUrl:""};';
    }

    location = /admin {
        return 301 /admin/;
    }

    # Админка (образ democracy-admin, serve на :3000). Срезаем /admin — контейнер отдаёт с корня.
    location /admin/ {
        proxy_pass http://democracy-admin:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- API (роль Gateway): фронт зовёт /api/democracy/**, сервис отдаёт с root — срезаем префикс. ---

    # WebSocket (SockJS/STOMP)
    location /api/democracy/ws/ {
        proxy_pass http://democracy-api:8126/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Media (LocalMediaController на полном /api/democracy/media — НЕ срезаем)
    location /api/democracy/media/ {
        proxy_pass http://democracy-api:8126/api/democracy/media/;
        proxy_set_header Host $host;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Остальной REST — срез /api/democracy
    location /api/democracy/ {
        proxy_pass http://democracy-api:8126/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Плеер игрока (образ democracy-player, serve на :3001) — корень
    location / {
        proxy_pass http://democracy-player:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
